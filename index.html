<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tutor Finder Pro</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; }

  header {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(15,23,42,0.8);
    backdrop-filter: blur(10px);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
  }

  header h1 { color: #38bdf8; }

  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, #1e293b, #0f172a);
  }

  .hero h2 {
    font-size: 3rem;
    margin-bottom: 10px;
  }

  .hero p { opacity: 0.7; }

  .search-box {
    margin-top: 20px;
  }

  input {
    padding: 12px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    cursor: pointer;
    font-weight: bold;
  }

  section {
    padding: 80px 20px;
    max-width: 1000px;
    margin: auto;
  }

  .card {
    background: #1e293b;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }

  .card h3 { color: #38bdf8; }

</style>
</head>
<body>

<header>
  <h1>TutorFinder</h1>
</header>

<div class="hero">
  <h2>Find the Best Tutors</h2>
  <p>Scroll down to explore</p>

  <div class="search-box">
    <input type="text" id="subject" placeholder="Subject">
    <input type="text" id="location" placeholder="Location">
    <button onclick="searchTutor()">Search</button>
  </div>
</div>

<section id="results"></section>

<script>
const tutors = [
  { name: "Rahul", subject: "Math", location: "Hyderabad" },
  { name: "Anjali", subject: "Physics", location: "Delhi" },
  { name: "Kiran", subject: "Chemistry", location: "Hyderabad" },
  { name: "Sneha", subject: "Math", location: "Bangalore" },
  { name: "Arjun", subject: "Biology", location: "Chennai" }
];

function searchTutor() {
  const subject = document.getElementById("subject").value.toLowerCase();
  const location = document.getElementById("location").value.toLowerCase();
  const results = document.getElementById("results");

  results.innerHTML = "";

  const filtered = tutors.filter(t =>
    t.subject.toLowerCase().includes(subject) &&
    t.location.toLowerCase().includes(location)
  );

  if (filtered.length === 0) {
    results.innerHTML = "<p>No tutors found</p>";
    return;
  }

  filtered.forEach(t => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<h3>${t.name}</h3><p>${t.subject}</p><p>${t.location}</p>`;
    results.appendChild(div);
  });

  window.scrollTo({ top: document.getElementById('results').offsetTop, behavior: 'smooth' });
}
</script>

</body>
</html>
