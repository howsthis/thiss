<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tutor Finder</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: #4CAF50; color: white; padding: 15px; text-align: center; }
    .container { padding: 20px; }
    input, select { padding: 10px; margin: 5px; width: 200px; }
    button { padding: 10px 15px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<header>
  <h1>Tutor Finder</h1>
</header>

<div class="container">
  <h2>Find a Tutor</h2>
  <input type="text" id="subject" placeholder="Subject (e.g. Math)">
  <input type="text" id="location" placeholder="Location">
  <button onclick="searchTutor()">Search</button>

  <div id="results"></div>
</div>

<script>
  const tutors = [
    { name: "Rahul", subject: "Math", location: "Hyderabad" },
    { name: "Anjali", subject: "Physics", location: "Delhi" },
    { name: "Kiran", subject: "Chemistry", location: "Hyderabad" },
    { name: "Sneha", subject: "Math", location: "Bangalore" }
  ];

  function searchTutor() {
    const subject = document.getElementById("subject").value.toLowerCase();
    const location = document.getElementById("location").value.toLowerCase();
    const resultsDiv = document.getElementById("results");

    resultsDiv.innerHTML = "";

    const filtered = tutors.filter(t =>
      t.subject.toLowerCase().includes(subject) &&
      t.location.toLowerCase().includes(location)
    );

    if (filtered.length === 0) {
      resultsDiv.innerHTML = "<p>No tutors found</p>";
      return;
    }

    filtered.forEach(tutor => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<h3>${tutor.name}</h3><p>${tutor.subject}</p><p>${tutor.location}</p>`;
      resultsDiv.appendChild(div);
    });
  }
</script>

</body>
</html>
